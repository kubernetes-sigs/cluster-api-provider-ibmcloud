apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: IBMCLOUD_API_KEY
          value: ${IBMCLOUD_API_KEY}
        - name: IBMCLOUD_REGION
          value: ${IBMCLOUD_REGION}

